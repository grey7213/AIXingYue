<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 惑梦（Homer）</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png">
  <script src="/assets/vendor/tailwindcss-browser.js?v=20260713-local"></script>
  <link rel="stylesheet" href="/assets/css/custom.css?v=20260703-fengyue-ui2">
  <link rel="stylesheet" href="/assets/css/admin.css?v=20260711-reference-ui1">
  <script type="module" src="/assets/js/admin-app.js?v=20260716-card-maker"></script>
  <script defer src="/app/assets/vendor/alpine-3.14.1.min.js?v=3.14.1"></script>
</head>
<body class="xy-admin min-h-screen">
  <div class="xy-stars-bg"></div>

  <main x-data="adminPanel()" x-init="init()" x-cloak>
    <!-- Toast -->
    <template x-if="toast">
      <div class="xy-toast" :class="`xy-toast-${toast.type}`" x-text="toast.message"></div>
    </template>

    <!-- 未授权提示 -->
    <template x-if="state === 'unauthorized'">
      <div class="min-h-screen flex items-center justify-center px-6">
        <div class="xy-glass p-10 text-center max-w-md w-full">
          <div class="w-16 h-16 rounded-2xl bg-red-500/15 flex items-center justify-center mx-auto mb-5">
            <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
          </div>
          <h1 class="text-xl font-bold mb-2" x-text="errorMessage || '需要管理员权限'"></h1>
          <p class="text-sm text-slate-400 mb-6" x-text="errorDetail || '请使用管理员账号登录'"></p>
          <div class="flex gap-3">
            <a href="/dashboard.html" class="xy-btn xy-btn-primary flex-1">前往登录</a>
            <a href="/" class="xy-btn xy-btn-ghost flex-1">返回首页</a>
          </div>
        </div>
      </div>
    </template>

    <!-- 已授权：管理面板 -->
    <template x-if="state === 'ready'">
      <div class="xy-admin-shell flex min-h-screen">
        <!-- 侧栏 -->
        <aside class="xy-admin-sidebar hidden md:flex flex-col w-64 p-5">
          <a href="/" class="flex items-center gap-3 mb-8">
            <img src="/assets/img/logo-64.png?v=20260627-logo" alt="惑梦（Homer）" class="w-10 h-10 drop-shadow-[0_0_12px_rgba(168,85,247,0.55)]">
            <div>
              <div class="font-bold text-base xy-gradient-text">惑梦（Homer）</div>
              <div class="text-[10px] text-slate-400">管理后台</div>
            </div>
          </a>
          <nav class="flex-1 space-y-1">
            <template x-for="tab in tabs" :key="tab.id">
              <button @click="switchTab(tab.id)" class="xy-admin-nav-item w-full flex items-center gap-3 px-3 py-2.5 text-sm font-medium" :class="activeTab === tab.id ? 'is-active' : ''">
                <span x-html="tab.icon" class="w-5 h-5"></span>
                <span x-text="tab.label"></span>
              </button>
            </template>
          </nav>
          <div class="mt-6 pt-6 border-t border-white/5 text-xs text-slate-400">
            <div class="mb-2 truncate">
              <span class="text-slate-500">管理员：</span>
              <span class="text-violet-300 font-medium" x-text="adminInfo?.email"></span>
            </div>
            <a href="/dashboard.html" class="xy-link">返回用户中心 →</a>
          </div>
        </aside>

        <!-- 移动端顶栏 -->
        <div class="xy-admin-mobilebar md:hidden fixed top-0 inset-x-0 z-30">
          <div class="flex items-center justify-between p-4">
            <div class="flex items-center gap-2">
              <img src="/assets/img/logo-64.png?v=20260627-logo" alt="惑梦（Homer）" class="w-8 h-8">
              <span class="font-bold text-sm">管理后台</span>
            </div>
            <select @change="switchTab($event.target.value)" class="xy-input text-sm py-2 px-3 bg-black/40">
              <template x-for="tab in tabs" :key="tab.id">
                <option :value="tab.id" :selected="activeTab === tab.id" x-text="tab.label"></option>
              </template>
            </select>
          </div>
        </div>

        <!-- 主内容 -->
        <div class="xy-admin-main flex-1 px-4 py-6 sm:px-6 md:px-8 md:py-7 pt-24 md:pt-7 overflow-x-auto">
          <!-- 统计 -->
          <div x-show="activeTab === 'stats'">
            <div class="flex items-center justify-between mb-6">
              <div>
                <h1 class="text-2xl font-bold xy-gradient-text">数据总览</h1>
                <p class="text-sm text-slate-400 mt-1">服务器整体运行情况</p>
              </div>
              <button @click="loadStats" class="xy-btn xy-btn-ghost text-sm" :disabled="loading">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                刷新
              </button>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
              <div class="xy-glass p-5">
                <div class="text-xs text-slate-400 mb-1">用户总数</div>
                <div class="text-3xl font-bold xy-gradient-text" x-text="stats?.user_count ?? '-'"></div>
                <div class="text-xs text-slate-500 mt-2">管理员 <span class="text-violet-300" x-text="stats?.admin_count ?? '-'"></span> · 24h 新增 <span class="text-emerald-400" x-text="stats?.registrations_24h ?? '-'"></span></div>
              </div>
              <div class="xy-glass p-5">
                <div class="text-xs text-slate-400 mb-1">请求总数</div>
                <div class="text-3xl font-bold xy-gradient-text" x-text="stats?.request_count ?? '-'"></div>
                <div class="text-xs text-slate-500 mt-2">24h 请求 <span class="text-blue-400" x-text="stats?.requests_24h ?? '-'"></span></div>
              </div>
              <div class="xy-glass p-5">
                <div class="text-xs text-slate-400 mb-1">已发放积分</div>
                <div class="text-3xl font-bold xy-gradient-text" x-text="stats?.total_points_issued ?? '-'"></div>
                <div class="text-xs text-slate-500 mt-2">充值订单 <span x-text="stats?.recharge_order_count ?? '-'"></span></div>
              </div>
              <div class="xy-glass p-5">
                <div class="text-xs text-slate-400 mb-1">用户余额</div>
                <div class="text-3xl font-bold xy-gradient-text" x-text="stats?.total_user_balance ?? '-'"></div>
                <div class="text-xs text-slate-500 mt-2">兑换码未用 <span x-text="stats?.redeem_code_unused_count ?? '-'"></span></div>
              </div>
            </div>

            <div class="grid xl:grid-cols-2 gap-6 mb-6">
              <div class="xy-glass p-6">
                <div class="flex items-center justify-between mb-4">
                  <h3 class="font-semibold">近 7 日新增用户</h3>
                  <span class="text-xs text-slate-500">按北京时间统计</span>
                </div>
                <div class="h-48 flex items-end gap-2">
                  <template x-for="day in (stats?.charts?.daily_users || [])" :key="day.label">
                    <div class="flex-1 min-w-0 flex flex-col items-center gap-2">
                      <div class="text-xs text-slate-300" x-text="day.value"></div>
                      <div class="w-full h-32 flex items-end rounded bg-white/5 overflow-hidden">
                        <div class="w-full rounded-t bg-emerald-400/80 transition-all" :style="`height: ${chartPercent(day.value, stats?.charts?.daily_users || [])}%`"></div>
                      </div>
                      <div class="text-[10px] text-slate-500 truncate" x-text="day.label"></div>
                    </div>
                  </template>
                </div>
              </div>

              <div class="xy-glass p-6">
                <div class="flex items-center justify-between mb-4">
                  <h3 class="font-semibold">近 7 日请求量</h3>
                  <span class="text-xs text-slate-500">全站 API</span>
                </div>
                <div class="h-48 flex items-end gap-2">
                  <template x-for="day in (stats?.charts?.daily_requests || [])" :key="day.label">
                    <div class="flex-1 min-w-0 flex flex-col items-center gap-2">
                      <div class="text-xs text-slate-300" x-text="day.value"></div>
                      <div class="w-full h-32 flex items-end rounded bg-white/5 overflow-hidden">
                        <div class="w-full rounded-t bg-sky-400/80 transition-all" :style="`height: ${chartPercent(day.value, stats?.charts?.daily_requests || [])}%`"></div>
                      </div>
                      <div class="text-[10px] text-slate-500 truncate" x-text="day.label"></div>
                    </div>
                  </template>
                </div>
              </div>
            </div>

            <div class="grid xl:grid-cols-3 gap-6 mb-6">
              <div class="xy-glass p-6">
                <h3 class="font-semibold mb-4">积分余额构成</h3>
                <div class="space-y-4">
                  <template x-for="item in (stats?.charts?.points_split || [])" :key="item.label">
                    <div>
                      <div class="flex justify-between text-xs mb-1">
                        <span class="text-slate-300" x-text="item.label"></span>
                        <span class="text-slate-400"><span x-text="item.value"></span> · <span x-text="distributionPercent(item.value, stats?.charts?.points_split || [])"></span>%</span>
                      </div>
                      <div class="h-2 rounded-full bg-white/5 overflow-hidden">
                        <div class="h-full rounded-full" :class="toneBarClass(item.tone)" :style="`width: ${distributionPercent(item.value, stats?.charts?.points_split || [])}%`"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <div class="xy-glass p-6">
                <h3 class="font-semibold mb-4">角色来源构成</h3>
                <div class="space-y-4">
                  <template x-for="item in (stats?.charts?.app_sources || [])" :key="item.label">
                    <div>
                      <div class="flex justify-between text-xs mb-1">
                        <span class="text-slate-300" x-text="item.label"></span>
                        <span class="text-slate-400"><span x-text="item.value"></span> · <span x-text="distributionPercent(item.value, stats?.charts?.app_sources || [])"></span>%</span>
                      </div>
                      <div class="h-2 rounded-full bg-white/5 overflow-hidden">
                        <div class="h-full rounded-full" :class="toneBarClass(item.tone)" :style="`width: ${distributionPercent(item.value, stats?.charts?.app_sources || [])}%`"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <div class="xy-glass p-6">
                <h3 class="font-semibold mb-4">请求状态分布</h3>
                <div class="space-y-4">
                  <template x-for="item in (stats?.charts?.request_status || [])" :key="item.label">
                    <div>
                      <div class="flex justify-between text-xs mb-1">
                        <span class="text-slate-300" x-text="item.label"></span>
                        <span class="text-slate-400"><span x-text="item.value"></span> · <span x-text="distributionPercent(item.value, stats?.charts?.request_status || [])"></span>%</span>
                      </div>
                      <div class="h-2 rounded-full bg-white/5 overflow-hidden">
                        <div class="h-full rounded-full" :class="toneBarClass(item.tone)" :style="`width: ${distributionPercent(item.value, stats?.charts?.request_status || [])}%`"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </div>

            <div class="grid xl:grid-cols-[1fr_420px] gap-6">
            <div class="xy-glass p-6">
              <h3 class="font-semibold mb-4">服务信息</h3>
              <div class="grid md:grid-cols-2 gap-y-3 text-sm">
                <div class="flex justify-between md:block">
                  <span class="text-slate-400 md:block md:mb-1 text-xs">服务域名</span>
                  <code class="text-violet-300 font-mono">patcher.villainy.top</code>
                </div>
                <div class="flex justify-between md:block">
                  <span class="text-slate-400 md:block md:mb-1 text-xs">健康检查</span>
                  <span class="text-emerald-400 inline-flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                    正常运行
                  </span>
                </div>
                <div class="flex justify-between md:block">
                  <span class="text-slate-400 md:block md:mb-1 text-xs">当前管理员</span>
                  <span class="text-slate-200" x-text="adminInfo?.email"></span>
                </div>
                <div class="flex justify-between md:block">
                  <span class="text-slate-400 md:block md:mb-1 text-xs">数据更新</span>
                  <span class="text-slate-200" x-text="lastStatsRefreshed ? formatTime(lastStatsRefreshed) : '-'"></span>
                </div>
              </div>
            </div>

              <div class="xy-glass p-6">
                <h3 class="font-semibold mb-4">24h 热门路径</h3>
                <div class="space-y-3">
                  <template x-if="!(stats?.charts?.top_paths || []).length">
                    <div class="text-sm text-slate-500">暂无请求记录</div>
                  </template>
                  <template x-for="item in (stats?.charts?.top_paths || [])" :key="item.label">
                    <div>
                      <div class="flex justify-between gap-3 text-xs mb-1">
                        <code class="text-slate-300 truncate" x-text="item.label"></code>
                        <span class="text-slate-400" x-text="item.value"></span>
                      </div>
                      <div class="h-2 rounded-full bg-white/5 overflow-hidden">
                        <div class="h-full rounded-full bg-violet-400" :style="`width: ${chartPercent(item.value, stats?.charts?.top_paths || [])}%`"></div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>

          <!-- 用户管理 -->
          <div x-show="activeTab === 'users'">
            <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
              <div>
                <h1 class="text-2xl font-bold xy-gradient-text">用户管理</h1>
                <p class="text-sm text-slate-400 mt-1">查看和管理所有注册用户</p>
              </div>
              <div class="flex items-center gap-2">
                <input type="text" x-model="userSearch" @keydown.enter="loadUsers(1)" placeholder="搜索邮箱/昵称/ID" class="xy-input text-sm w-56">
                <button @click="loadUsers(1)" class="xy-btn xy-btn-primary text-sm py-2 px-4">搜索</button>
              </div>
            </div>

            <div class="xy-glass overflow-hidden">
              <div class="overflow-x-auto">
                <table class="xy-table">
                  <thead>
                    <tr>
                      <th>邮箱</th>
                      <th>昵称</th>
                      <th>权限</th>
                      <th>高级创作</th>
                      <th>积分</th>
                      <th>注册时间</th>
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-if="users.length === 0 && !loading">
                      <tr><td colspan="7" class="text-center text-slate-500 py-12">暂无数据</td></tr>
                    </template>
                    <template x-for="u in users" :key="u.id">
                      <tr>
                        <td class="font-mono text-xs" x-text="u.email"></td>
                        <td x-text="u.name"></td>
                        <td>
                          <span class="xy-badge" :class="adminBadgeClass(u)" x-text="adminLabel(u)"></span>
                        </td>
                        <td><span class="xy-badge" :class="advancedCreationBadge(u)" x-text="advancedCreationLabel(u)"></span></td>
                        <td>
                          <span class="xy-badge xy-badge-purple" x-text="u.points"></span>
                        </td>
                        <td class="text-xs text-slate-400" x-text="formatTime(u.created_at)"></td>
                        <td>
                          <div class="flex items-center gap-3 text-xs flex-wrap min-w-40">
                            <button @click="adjustPointsPrompt(u)" class="text-violet-300 hover:text-white">调整积分</button>
                            <button @click="toggleAdvancedCreation(u)" class="text-amber-300 hover:text-amber-100" x-text="u.advanced_creation?.admin_override ? '收回高级创作' : '开放高级创作'"></button>
                            <button
                              @click="toggleUserAdmin(u)"
                              :disabled="u.can_toggle_admin === false || (adminInfo?.id === u.id && u.is_admin)"
                              class="text-cyan-300 hover:text-cyan-100 disabled:text-slate-600 disabled:cursor-not-allowed"
                              x-text="u.is_admin ? '撤销管理员' : '设为管理员'"></button>
                          </div>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
              <div class="flex items-center justify-between p-4 border-t border-white/5 text-sm">
                <span class="text-slate-400">共 <span class="text-white" x-text="userTotal"></span> 条</span>
                <div class="flex items-center gap-2">
                  <button @click="loadUsers(userPage - 1)" :disabled="userPage <= 1 || loading" class="xy-btn xy-btn-ghost text-xs py-1.5 px-3">上一页</button>
                  <span class="text-slate-300 text-xs">第 <span x-text="userPage"></span> / <span x-text="Math.max(1, Math.ceil(userTotal / userLimit))"></span> 页</span>
                  <button @click="loadUsers(userPage + 1)" :disabled="userPage >= Math.ceil(userTotal / userLimit) || loading" class="xy-btn xy-btn-ghost text-xs py-1.5 px-3">下一页</button>
                </div>
              </div>
            </div>
          </div>

          <!-- 请求日志 -->
          <div x-show="activeTab === 'logs'">
            <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
              <div>
                <h1 class="text-2xl font-bold xy-gradient-text">请求日志</h1>
                <p class="text-sm text-slate-400 mt-1">所有 API 请求的访问记录</p>
              </div>
              <div class="flex items-center gap-2 flex-wrap">
                <select x-model="logFilters.method" @change="loadLogs(1)" class="xy-input text-sm py-2 w-28">
                  <option value="">全部方法</option>
                  <option value="GET">GET</option>
                  <option value="POST">POST</option>
                  <option value="PUT">PUT</option>
                  <option value="DELETE">DELETE</option>
                </select>
                <input type="text" x-model="logFilters.path" @keydown.enter="loadLogs(1)" placeholder="路径包含..." class="xy-input text-sm w-48">
                <button @click="loadLogs(1)" class="xy-btn xy-btn-primary text-sm py-2 px-4">查询</button>
              </div>
            </div>

            <div class="xy-glass overflow-hidden">
              <div class="overflow-x-auto">
                <table class="xy-table">
                  <thead>
                    <tr>
                      <th class="w-32">时间</th>
                      <th class="w-20">方法</th>
                      <th>路径</th>
                      <th class="w-20">状态</th>
                      <th class="w-20">操作</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-if="logs.length === 0 && !loading">
                      <tr><td colspan="5" class="text-center text-slate-500 py-12">暂无数据</td></tr>
                    </template>
                    <template x-for="log in logs" :key="log.id">
                      <tr>
                        <td class="text-xs text-slate-400 whitespace-nowrap" x-text="formatTime(log.ts)"></td>
                        <td>
                          <span class="xy-badge" :class="methodBadge(log.method)" x-text="log.method"></span>
                        </td>
                        <td class="font-mono text-xs break-all" x-text="log.path + (log.query ? '?' + log.query : '')"></td>
                        <td>
                          <span class="xy-badge" :class="statusBadge(log.status)" x-text="log.status"></span>
                        </td>
                        <td>
                          <button @click="showLogDetail(log.id)" class="text-violet-300 hover:text-white text-xs">详情</button>
                        </td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
              <div class="flex items-center justify-between p-4 border-t border-white/5 text-sm">
                <span class="text-slate-400">共 <span class="text-white" x-text="logTotal"></span> 条</span>
                <div class="flex items-center gap-2">
                  <button @click="loadLogs(logPage - 1)" :disabled="logPage <= 1 || loading" class="xy-btn xy-btn-ghost text-xs py-1.5 px-3">上一页</button>
                  <span class="text-slate-300 text-xs">第 <span x-text="logPage"></span> / <span x-text="Math.max(1, Math.ceil(logTotal / logLimit))"></span> 页</span>
                  <button @click="loadLogs(logPage + 1)" :disabled="logPage >= Math.ceil(logTotal / logLimit) || loading" class="xy-btn xy-btn-ghost text-xs py-1.5 px-3">下一页</button>
                </div>
              </div>
            </div>
          </div>

          <!-- 充值订单 -->
          <div x-show="activeTab === 'orders'">
            <div class="flex items-center justify-between mb-6">
              <div>
                <h1 class="text-2xl font-bold xy-gradient-text">充值订单</h1>
                <p class="text-sm text-slate-400 mt-1">所有用户的充值记录</p>
              </div>
              <button @click="loadOrders(orderPage)" class="xy-btn xy-btn-ghost text-sm" :disabled="loading">刷新</button>
            </div>

            <div class="xy-glass overflow-hidden">
              <div class="overflow-x-auto">
                <table class="xy-table">
                  <thead>
                    <tr>
                      <th>订单号</th>
                      <th>用户</th>
                      <th>商品</th>
                      <th>积分</th>
                      <th>来源 IP</th>
                      <th>时间</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-if="orders.length === 0 && !loading">
                      <tr><td colspan="6" class="text-center text-slate-500 py-12">暂无订单</td></tr>
                    </template>
                    <template x-for="o in orders" :key="o.id">
                      <tr>
                        <td class="font-mono text-xs" x-text="o.order_id"></td>
                        <td>
                          <div class="text-sm" x-text="o.name || '-'"></div>
                          <div class="text-xs text-slate-500" x-text="o.email || ''"></div>
                        </td>
                        <td class="text-xs text-slate-400" x-text="o.product_id"></td>
                        <td>
                          <span class="xy-badge xy-badge-green">+<span x-text="o.points"></span></span>
                        </td>

              <div class="rounded-xl border border-white/10 bg-black/20 p-4 space-y-4">
                <div>
                  <h4 class="text-sm font-semibold text-violet-100">原始字段编辑</h4>
                  <p class="text-xs text-slate-500 mt-1">这些字段按 JSON 保存，可直接粘 Character Card / ST 里的世界书、Regex、扩展和快捷回复。</p>
                </div>
                <div>
                  <label class="xy-label">备用开场 alternate_greetings（JSON 数组）</label>
                  <textarea class="xy-input min-h-36 font-mono text-xs" x-model="appDialog.alternate_greetings_raw" spellcheck="false"></textarea>
                </div>
                <div>
                  <label class="xy-label">世界书 world_info（JSON 数组 / entries）</label>
                  <textarea class="xy-input min-h-56 font-mono text-xs" x-model="appDialog.world_info_raw" spellcheck="false"></textarea>
                </div>
                <div>
                  <label class="xy-label">Regex / TavernHelper 脚本（JSON 数组）</label>
                  <textarea class="xy-input min-h-56 font-mono text-xs" x-model="appDialog.regex_scripts_raw" spellcheck="false"></textarea>
                </div>
                <div class="grid md:grid-cols-2 gap-3">
                  <div>
                    <label class="xy-label">Prompt Blocks（JSON 数组）</label>
                    <textarea class="xy-input min-h-44 font-mono text-xs" x-model="appDialog.prompt_blocks_raw" spellcheck="false"></textarea>
                  </div>
                  <div>
                    <label class="xy-label">Quick Replies（JSON 数组）</label>
                    <textarea class="xy-input min-h-44 font-mono text-xs" x-model="appDialog.quick_replies_raw" spellcheck="false"></textarea>
                  </div>
                  <div>
                    <label class="xy-label">Extensions（JSON 对象）</label>
                    <textarea class="xy-input min-h-44 font-mono text-xs" x-model="appDialog.extensions_raw" spellcheck="false"></textarea>
                  </div>
                  <div>
                    <label class="xy-label">Sampling（JSON 对象）</label>
                    <textarea class="xy-input min-h-44 font-mono text-xs" x-model="appDialog.sampling_raw" spellcheck="false"></textarea>
                  </div>
                </div>
                <div>
                  <div class="flex items-center justify-between gap-3 mb-2">
                    <label class="xy-label mb-0">完整 JSON 视图 / 合并编辑</label>
                    <label class="flex items-center gap-2 text-xs text-slate-400">
                      <input type="checkbox" class="accent-violet-500" x-model="appDialog.merge_full_json">
                      保存时合并完整 JSON
                    </label>
                  </div>
                  <textarea class="xy-input min-h-72 font-mono text-xs" x-model="appDialog.full_json_raw" spellcheck="false"></textarea>
                </div>
              </div>
              <div class="grid md:grid-cols-3 gap-3">
                <div>
                  <label class="xy-label">标签</label>
                  <input class="xy-input" x-model="appDialog.tagsText" placeholder="恋爱，校园">
                </div>
                <div>
                  <label class="xy-label">模型</label>
                  <input class="xy-input" x-model="appDialog.llm_model" placeholder="留空使用默认模型">
                </div>
                <div>
                  <label class="xy-label">排序权重</label>
                  <input type="number" class="xy-input" x-model.number="appDialog.sort_weight">
                </div>
              </div>
              <div class="flex items-center gap-5">
                <label class="flex items-center gap-2 text-sm text-slate-300">
                  <input type="checkbox" x-model="appDialog.is_public" class="accent-violet-500">
                  发布到探索页
                </label>
                <select x-model="appDialog.status" class="xy-input text-sm py-2 w-36">
                  <option value="published">published</option>
                  <option value="draft">draft</option>
                </select>
              </div>
            </div>
            <aside class="space-y-3">
              <div class="aspect-[4/5] rounded-lg overflow-hidden bg-black/30 border border-white/10">
                <img x-show="appDialog.cover_url" :src="appDialog.cover_url" class="w-full h-full object-cover" alt="">
                <div x-show="!appDialog.cover_url" class="w-full h-full flex items-center justify-center text-xs text-slate-500">角色封面</div>
              </div>
              <input class="xy-input text-sm" x-model="appDialog.cover_url" placeholder="封面 URL">
              <label class="xy-btn xy-btn-ghost w-full justify-center cursor-pointer text-sm">
                <span x-show="!appCoverUploading">上传封面</span>
                <span x-show="appCoverUploading" class="xy-loading"></span>
                <input type="file" class="hidden" accept="image/*" @change="onAppCoverChange">
              </label>
              <div class="flex gap-2">
                <button @click="appDialog = null" class="xy-btn xy-btn-ghost flex-1">取消</button>
                <button @click="saveAppDialog" class="xy-btn xy-btn-primary flex-1" :disabled="loading">
                  <span x-show="!loading">保存</span>
                  <span x-show="loading" class="xy-loading"></span>
                </button>
              </div>
            </aside>
          </div>
        </div>
      </div>
    </template>

    <!-- 角色卡批量编辑弹窗 -->
    <template x-if="appBulkDialog && appBulkForm">
      <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur" @click.self="appBulkDialog = false">
        <div class="xy-glass max-w-5xl w-full max-h-[90vh] overflow-y-auto">
          <div class="flex items-center justify-between p-5 border-b border-white/5 sticky top-0 bg-black/40 backdrop-blur">
            <div>
              <h3 class="font-semibold">批量编辑角色卡</h3>
              <p class="text-xs text-slate-400 mt-1">当前选中 <span class="text-violet-200" x-text="selectedAppIds.length"></span> 张角色卡</p>
            </div>
            <button @click="appBulkDialog = false" class="text-slate-400 hover:text-white">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="p-6 grid lg:grid-cols-[1fr_300px] gap-5">
            <div class="space-y-5">
              <div class="grid md:grid-cols-[180px_1fr] gap-3">
                <div>
                  <label class="xy-label">标签处理</label>
                  <select x-model="appBulkForm.tags_mode" class="xy-input">
                    <option value="none">不修改标签</option>
                    <option value="replace">替换为</option>
                    <option value="append">追加</option>
                    <option value="remove">移除</option>
                  </select>
                </div>
                <div x-show="appBulkForm.tags_mode !== 'none'">
                  <label class="xy-label">标签</label>
                  <input class="xy-input" x-model="appBulkForm.tagsText" placeholder="恋爱，校园，治愈">
                </div>
              </div>

              <div class="rounded-lg border border-white/10 bg-white/5 p-4 space-y-3">
                <label class="flex items-center gap-2 text-sm text-slate-300">
                  <input type="checkbox" x-model="appBulkForm.summary_enabled" class="accent-violet-500">
                  覆盖一句简介
                </label>
                <input class="xy-input" x-model="appBulkForm.summary" :disabled="!appBulkForm.summary_enabled" maxlength="180" placeholder="批量写入新的短简介">
              </div>

              <div class="rounded-lg border border-white/10 bg-white/5 p-4 space-y-3">
                <label class="flex items-center gap-2 text-sm text-slate-300">
                  <input type="checkbox" x-model="appBulkForm.description_enabled" class="accent-violet-500">
                  覆盖角色设定
                </label>
                <textarea class="xy-input min-h-32" x-model="appBulkForm.description" :disabled="!appBulkForm.description_enabled" placeholder="批量写入新的角色设定/简介正文"></textarea>
              </div>

              <div class="rounded-lg border border-white/10 bg-white/5 p-4 space-y-3">
                <div class="grid md:grid-cols-[180px_1fr] gap-3">
                  <div>
                    <label class="xy-label">世界书处理</label>
                    <select x-model="appBulkForm.world_mode" class="xy-input">
                      <option value="none">不修改世界书</option>
                      <option value="replace">整体替换</option>
                      <option value="append">追加条目</option>
                      <option value="merge">按名称/ID 合并</option>
                    </select>
                  </div>
                  <div class="text-xs text-slate-400 leading-6">
                    支持世界书数组、Character Book <code class="text-violet-200">entries</code>，或 Character Card V2 的 <code class="text-violet-200">data.character_book.entries</code>。
                  </div>
                </div>
                <textarea class="xy-input min-h-56 font-mono text-xs" x-model="appBulkForm.worldRaw" :disabled="appBulkForm.world_mode === 'none'" spellcheck="false" placeholder='[
  {
    "name": "地点设定",
    "keys": ["图书馆"],
    "content": "图书馆相关世界书内容...",
    "position": "system",
    "priority": 100
  }
]'></textarea>
              </div>
            </div>
            <aside class="space-y-4">
              <div class="rounded-lg border border-amber-400/20 bg-amber-500/10 p-4 text-xs text-amber-100/90 leading-6">
                批量操作只会影响已勾选角色卡。简介、角色设定和世界书替换会覆盖原内容，请先确认选择范围。
              </div>
              <button @click="submitBulkUpdate" class="xy-btn xy-btn-primary w-full justify-center" :disabled="loading">
                <span x-show="!loading">提交批量修改</span>
                <span x-show="loading" class="xy-loading"></span>
              </button>
              <button @click="appBulkDialog = false" class="xy-btn xy-btn-ghost w-full justify-center">关闭</button>
              <template x-if="appBulkResult">
                <div class="space-y-3">
                  <div class="rounded-lg border border-emerald-400/20 bg-emerald-500/10 p-4">
                    <div class="text-sm text-emerald-100 font-semibold">更新 <span x-text="appBulkResult.updated || 0"></span> / <span x-text="appBulkResult.requested || 0"></span> 张</div>
                    <div class="text-xs text-slate-400 mt-1">接口已返回批量处理结果。</div>
                  </div>
                  <template x-if="(appBulkResult.not_found || []).length">
                    <div class="rounded-lg border border-amber-400/20 bg-amber-500/10 p-4">
                      <div class="text-sm text-amber-100 font-semibold mb-2">未找到 <span x-text="appBulkResult.not_found.length"></span> 张</div>
                      <div class="text-xs text-amber-100/80 break-all" x-text="appBulkResult.not_found.join(', ')"></div>
                    </div>
                  </template>
                  <template x-if="(appBulkResult.errors || []).length">
                    <div class="rounded-lg border border-rose-400/20 bg-rose-500/10 p-4">
                      <div class="text-sm text-rose-100 font-semibold mb-2">失败 <span x-text="appBulkResult.error_count || 0"></span> 条</div>
                      <div class="space-y-2 max-h-48 overflow-y-auto">
                        <template x-for="err in appBulkResult.errors" :key="err.id">
                          <div class="text-xs text-rose-100/80">
                            <span x-text="err.id"></span>
                            <span x-text="err.message"></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </aside>
          </div>
        </div>
      </div>
    </template>

    <!-- 角色卡导入弹窗 -->
    <template x-if="appImportDialog">
      <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur" @click.self="appImportDialog = false">
        <div class="xy-glass max-w-4xl w-full max-h-[90vh] overflow-y-auto">
          <div class="flex items-center justify-between p-5 border-b border-white/5 sticky top-0 bg-black/40 backdrop-blur">
            <h3 class="font-semibold">导入角色卡 JSON</h3>
            <button @click="appImportDialog = false" class="text-slate-400 hover:text-white">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="p-6 grid lg:grid-cols-[1fr_280px] gap-5">
            <div class="space-y-4">
              <div class="rounded-lg border border-white/10 bg-white/5 p-4 text-sm text-slate-300">
                支持单个对象、数组，或包含 <code class="text-violet-200">items/list/cards/apps</code> 的 JSON。至少需要 <code class="text-violet-200">name</code> 字段。
              </div>
              <label class="xy-btn xy-btn-ghost w-fit cursor-pointer text-sm">
                选择 JSON 文件
                <input type="file" class="hidden" accept=".json,application/json" @change="onAppImportFileChange">
              </label>
              <div x-show="appImportFileName" class="text-xs text-slate-400">已读取：<span class="text-violet-200" x-text="appImportFileName"></span></div>
              <textarea class="xy-input min-h-[360px] font-mono text-xs" x-model="appImportRaw" spellcheck="false" placeholder='[
  {
    "name": "星月向导",
    "summary": "温柔的陪伴型角色",
    "description": "角色设定...",
    "tags": ["陪伴", "治愈"],
    "opening_statement": "晚上好，今天想聊些什么？"
  }
]'></textarea>
            </div>
            <aside class="space-y-4">
              <button @click="submitAppImport" class="xy-btn xy-btn-primary w-full justify-center" :disabled="loading">
                <span x-show="!loading">导入为官方角色</span>
                <span x-show="loading" class="xy-loading"></span>
              </button>
              <template x-if="appImportResult">
                <div class="space-y-3">
                  <div class="rounded-lg border border-emerald-400/20 bg-emerald-500/10 p-4">
                    <div class="text-sm text-emerald-100 font-semibold">成功 <span x-text="appImportResult.count || 0"></span> 条</div>
                    <div class="text-xs text-slate-400 mt-1">导入后会出现在官方角色列表，可继续编辑上下架。</div>
                  </div>
                  <template x-if="(appImportResult.errors || []).length">
                    <div class="rounded-lg border border-rose-400/20 bg-rose-500/10 p-4">
                      <div class="text-sm text-rose-100 font-semibold mb-2">失败 <span x-text="appImportResult.error_count || 0"></span> 条</div>
                      <div class="space-y-2 max-h-48 overflow-y-auto">
                        <template x-for="err in appImportResult.errors" :key="err.index">
                          <div class="text-xs text-rose-100/80">
                            #<span x-text="err.index"></span>
                            <span x-text="err.name || ''"></span>
                            <span x-text="err.message"></span>
                          </div>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </aside>
          </div>
        </div>
      </div>
    </template>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>群聊 · AI星月</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png">
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/app/assets/css/app.css?v=20260703-fengyue-home3">
  <style>
    .group-layout { display:grid; grid-template-columns:260px minmax(0,1fr) 320px; height:100vh; }
    .group-panel { border-right:1px solid rgba(196,181,253,.14); background:rgba(12,6,34,.62); backdrop-filter:blur(14px); overflow:hidden; display:flex; flex-direction:column; }
    .group-panel.right { border-right:none; border-left:1px solid rgba(196,181,253,.14); }
    .group-head { padding:16px; border-bottom:1px solid rgba(196,181,253,.12); font-weight:800; color:#fff; }
    .group-scroll { overflow:auto; flex:1; padding:12px; }
    .group-item { width:100%; text-align:left; padding:11px; border-radius:14px; border:1px solid transparent; color:#e8e2ff; transition:.16s; }
    .group-item:hover, .group-item.is-active { background:rgba(168,85,247,.14); border-color:rgba(240,171,252,.24); }
    .role-card { display:flex; gap:10px; align-items:center; padding:9px; border-radius:13px; border:1px solid rgba(196,181,253,.13); background:rgba(255,255,255,.04); cursor:pointer; }
    .role-card img, .role-avatar { width:38px; height:38px; border-radius:50%; object-fit:cover; background:linear-gradient(135deg,#8b5cf6,#ec4899); color:white; display:flex; align-items:center; justify-content:center; font-weight:800; flex-shrink:0; }
    .chat-main { display:flex; flex-direction:column; min-width:0; }
    .chat-top { padding:16px 22px; border-bottom:1px solid rgba(196,181,253,.13); background:rgba(10,4,32,.58); }
    .group-messages { flex:1; overflow:auto; padding:24px; display:flex; flex-direction:column; gap:13px; }
    .gmsg { max-width:76%; display:flex; flex-direction:column; gap:4px; }
    .gmsg.user { align-self:flex-end; align-items:flex-end; }
    .gmsg.assistant { align-self:flex-start; }
    .gmsg .speaker { font-size:12px; color:rgba(232,226,255,.58); padding:0 6px; }
    .gmsg .bubble { padding:12px 15px; border-radius:18px; line-height:1.65; font-size:14px; word-break:break-word; }
    .gmsg.user .bubble { background:linear-gradient(135deg,#8b5cf6,#d946ef 65%,#fb7185); color:#fff; border-bottom-right-radius:5px; }
    .gmsg.assistant .bubble { background:rgba(255,255,255,.06); border:1px solid rgba(196,181,253,.18); color:#f4efff; border-bottom-left-radius:5px; }
    .group-input { padding:14px 18px; border-top:1px solid rgba(196,181,253,.13); display:flex; gap:10px; background:rgba(10,4,32,.75); }
    .group-input textarea { flex:1; resize:none; min-height:44px; max-height:140px; border-radius:15px; padding:12px 14px; background:rgba(255,255,255,.05); border:1px solid rgba(196,181,253,.22); color:white; }
    .chip { display:inline-flex; align-items:center; gap:6px; padding:6px 9px; border-radius:999px; background:rgba(168,85,247,.15); color:#f5d0fe; font-size:12px; margin:4px; }
    @media (max-width: 1024px) {
      .group-layout { grid-template-columns:1fr; height:auto; min-height:100vh; }
      .group-panel { display:none; }
      .group-panel.right { display:flex; min-height:360px; border-left:none; border-top:1px solid rgba(196,181,253,.14); }
      .chat-main { min-height:calc(100vh - 430px); }
      .group-input { padding-bottom:78px; }
    }
    /* Fengyue clone group chat skin. */
    .group-layout { background: var(--fy-bg); }
    .group-panel {
      border-color: var(--fy-border);
      background: var(--fy-panel);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    .group-panel.right { border-left-color: var(--fy-border); }
    .group-head {
      border-bottom-color: var(--fy-border);
      color: var(--fy-text);
      background: var(--fy-panel);
    }
    .group-item {
      color: var(--fy-text);
      border-radius: 12px;
    }
    .group-item:hover,
    .group-item.is-active {
      background: var(--fy-accent-soft);
      border-color: var(--fy-accent);
      color: var(--fy-accent-2);
    }
    .role-card {
      border-color: var(--fy-border);
      background: var(--fy-panel-2);
    }
    .role-card:hover {
      border-color: var(--fy-accent);
      background: var(--fy-accent-soft);
    }
    .role-card img,
    .role-avatar {
      background: linear-gradient(135deg, #f0a868, #e8834e);
    }
    .chat-top {
      border-bottom-color: var(--fy-border);
      background: var(--fy-panel);
    }
    .group-messages {
      background: var(--fy-bg);
    }
    .gmsg .speaker {
      color: var(--fy-text-mute);
    }
    .gmsg.user .bubble {
      background: var(--fy-accent-2);
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .gmsg.assistant .bubble {
      background: var(--fy-panel);
      border: 1px solid var(--fy-border);
      color: var(--fy-text);
      border-bottom-left-radius: 5px;
    }
    .group-input {
      border-top-color: var(--fy-border);
      background: var(--fy-panel);
    }
    .group-input textarea {
      background: var(--fy-panel-2);
      border-color: var(--fy-border);
      color: var(--fy-text);
    }
    .group-input textarea:focus {
      outline: none;
      border-color: var(--fy-accent);
      box-shadow: 0 0 0 3px rgba(239,154,95,.16);
      background: #fff;
    }
    .chip {
      background: var(--fy-accent-soft);
      color: var(--fy-accent-2);
    }
    .px-5.py-2.border-t {
      border-top-color: var(--fy-border) !important;
      background: var(--fy-panel);
    }
    @media (max-width: 1024px) {
      .group-panel.right {
        border-top-color: var(--fy-border);
      }
    }
  </style>
  <script type="module" src="/app/assets/js/group-chat.js?v=20260703-channels-closed"></script>
  <script defer src="/app/assets/vendor/alpine-3.14.1.min.js?v=3.14.1"></script>
</head>
<body class="min-h-screen">
  <div class="xy-stars-bg"></div>
  <div class="app-shell" x-data="groupChatPage()" x-init="init()" x-cloak>
    <aside class="app-sidebar" data-app-sidebar></aside>
    <main class="app-main">
      <div class="group-layout">
        <aside class="group-panel">
          <div class="group-head" x-text="groupText('page_title', '群聊')"></div>
          <div class="group-scroll">
            <template x-if="!groups.length">
              <div class="text-xs text-violet-200/60 text-center py-10" x-text="groupText('empty_groups', '还没有群聊')"></div>
            </template>
            <template x-for="g in groups" :key="g.id">
              <button class="group-item mb-2" :class="{ 'is-active': current?.id === g.id }" @click="openGroup(g)">
                <div class="flex items-center justify-between gap-2">
                  <div class="font-semibold truncate" x-text="g.name"></div>
                  <span class="text-xs text-violet-200/50" x-text="(g.members||[]).length + groupText('member_count_suffix', '人')"></span>
                </div>
                <div class="text-xs text-violet-200/55 truncate mt-1" x-text="g.last_message || groupText('last_message_default', '点击打开')"></div>
              </button>
            </template>
          </div>
        </aside>

        <section class="chat-main">
          <div class="chat-top">
            <div class="flex items-center justify-between gap-3">
              <div>
                <h1 class="text-xl font-extrabold text-white" x-text="current?.name || groupText('empty_current_title', '创建或选择一个群聊')"></h1>
                <p class="text-xs text-violet-200/60 mt-1" x-text="current ? (current.members||[]).map(m=>m.app_name).join('、') : groupText('empty_current_hint', '选择至少 2 个角色开始多人对话')"></p>
              </div>
              <button class="xy-btn xy-btn-ghost text-sm" x-show="current" @click="deleteGroup(current)" x-text="groupText('delete_group_button', '删除群聊')"></button>
            </div>
          </div>

          <div class="group-messages" x-ref="messages">
            <template x-if="!current">
              <div class="m-auto text-center text-violet-200/70">
                <img src="/assets/img/apk/empty_view.webp?v=20260627-logo" class="w-32 mx-auto opacity-60 mb-4">
                <p class="text-sm" x-text="groupText('no_current_text', '从右侧选择角色创建群聊')"></p>
              </div>
            </template>
            <template x-for="m in messages" :key="m.id">
              <div class="gmsg" :class="m.role === 'user' ? 'user' : 'assistant'">
                <div class="speaker" x-text="m.speaker_name || (m.role === 'user' ? groupText('user_speaker', '我') : groupText('assistant_speaker', '角色'))"></div>
                <div class="bubble" x-text="m.content"></div>
              </div>
            </template>
            <template x-if="busy && current">
              <div class="gmsg assistant"><div class="speaker" x-text="groupText('loading_speaker', '生成中')"></div><div class="bubble">...</div></div>
            </template>
          </div>

          <div class="px-5 py-2 border-t border-violet-200/10" x-show="current">
            <div class="text-xs text-violet-200/60 mb-2" x-text="groupText('force_reply_label', '指定角色发言')"></div>
            <template x-for="m in current?.members || []" :key="m.app_id">
              <button class="chip" @click="replyAs(m)" :disabled="busy" x-text="m.app_name"></button>
            </template>
          </div>

          <div class="group-input" x-show="current">
            <textarea x-model="draft" rows="1" @keydown.enter.prevent="send" :placeholder="groupText('input_placeholder', '发送群聊消息，下一位角色会自动回复...')"></textarea>
            <button class="xy-btn xy-btn-primary" @click="send" :disabled="busy || !draft.trim()" x-text="groupText('send_button', '发送')"></button>
          </div>
        </section>

        <aside class="group-panel right">
          <div class="group-head" x-text="groupText('create_panel_title', '创建群聊')"></div>
          <div class="group-scroll">
            <input class="xy-input text-sm mb-2" x-model="groupName" :placeholder="groupText('group_name_placeholder', '群聊名称')">
            <div class="mb-3">
              <template x-for="r in selected" :key="r.id">
                <span class="chip"><span x-text="r.name"></span><button @click="removeRole(r.id)">×</button></span>
              </template>
            </div>
            <button class="xy-btn xy-btn-primary w-full justify-center mb-4" @click="createGroup" :disabled="busy || selected.length < 2" x-text="groupText('create_button', '创建群聊')"></button>

            <div class="flex gap-2 mb-3">
              <input class="xy-input text-sm" x-model="query" @keydown.enter.prevent="searchRoles" :placeholder="groupText('search_placeholder', '搜索角色')">
              <button class="xy-btn xy-btn-ghost" @click="searchRoles" x-text="groupText('search_button', '搜索')"></button>
            </div>
            <div class="grid gap-2">
              <template x-for="c in candidates" :key="c.id">
                <div class="role-card" @click="addRole(c)">
                  <img x-show="c.cover || c.cover_url" :src="c.cover || c.cover_url" referrerpolicy="no-referrer" onerror="this.style.display='none'">
                  <div class="role-avatar" x-show="!(c.cover || c.cover_url)" x-text="(c.name || '?').slice(0,1)"></div>
                  <div class="min-w-0">
                    <div class="text-sm text-white font-semibold truncate" x-text="c.name"></div>
                    <div class="text-xs text-violet-200/55 truncate" x-text="c.summary || c.description || groupText('role_card_fallback', '角色卡')"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </aside>
      </div>
    </main>
    <nav class="app-bottom-nav" data-app-bottom-nav></nav>
    <div class="fixed top-4 right-4 z-[80]" x-show="toast">
      <div class="px-4 py-3 rounded-xl border text-sm" :class="toast?.type === 'error' ? 'bg-rose-950/90 border-rose-400/40 text-rose-100' : 'bg-violet-950/90 border-violet-300/30 text-violet-100'" x-text="toast?.message"></div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>操作记录 · AI星月</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png">
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/app/assets/css/app.css?v=20260703-fengyue-home3">
  <script type="module" src="/app/assets/js/hub-pages.js?v=20260703-fengyue-home3"></script>
  <script defer src="/app/assets/vendor/alpine-3.14.1.min.js?v=3.14.1"></script>
</head>
<body class="min-h-screen">
  <div class="xy-stars-bg"></div>

  <div class="app-shell" x-data="logsPage()" x-init="init()" x-cloak>
    <aside class="app-sidebar" data-app-sidebar></aside>
    <main class="app-main">
      <header class="app-topbar"><h1 x-text="appNavText('logs', '操作记录')">操作记录</h1><div class="grow"></div><button class="xy-btn xy-btn-ghost text-sm" @click="loadList">↻ <span x-text="dashboardText('balance_refresh_text', '刷新')">刷新</span></button></header>
      <section class="app-page-pad max-w-5xl mx-auto">
        <div class="list-panel">
          <template x-if="!loading && logs.length === 0"><div class="p-10 text-center text-violet-200/70" x-text="emptyText('logs_empty_title', '暂无操作记录')">暂无操作记录</div></template>
          <template x-for="item in logs" :key="item.id">
            <div class="list-row !grid-cols-[minmax(0,1fr)_auto]">
              <div><div class="title" x-text="item.summary || item.event_type"></div><div class="meta" x-text="`${item.event_type} · ${new Date(item.created_at).toLocaleString()}`"></div></div>
              <span class="xy-badge xy-badge-purple" x-text="item.event_type"></span>
            </div>
          </template>
        </div>
      </section>
    </main>
    <nav class="app-bottom-nav" data-app-bottom-nav></nav>
  </div>
</body>
</html>

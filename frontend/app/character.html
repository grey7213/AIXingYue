<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色详情 · AI星月</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png">
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/app/assets/css/app.css">
  <script type="module" src="/app/assets/js/character.js?v=20260626-ass12"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen">
  <div class="xy-stars-bg"></div>
  <div class="xy-meteor"></div>

  <div class="app-shell" x-data="characterPage()" x-init="init()" x-cloak>
    <aside class="app-sidebar" data-app-sidebar></aside>

    <main class="app-main">
      <header class="app-topbar">
        <a href="/app/explore.html" class="xy-btn xy-btn-ghost text-sm px-3 py-2">← <span x-text="characterText('back_text', '返回')"></span></a>
        <h1 x-text="characterText('page_title', '角色详情')"></h1>
        <div class="grow"></div>
        <a :href="card ? `/app/chat.html?app_id=${encodeURIComponent(card.id)}` : '#'" class="xy-btn xy-btn-primary text-sm" x-text="characterText('start_chat_text', '开始聊天')"></a>
      </header>

      <div x-show="loading" class="flex items-center justify-center py-24">
        <div class="xy-loading"></div>
      </div>

      <section x-show="!loading && card" class="app-page-pad max-w-6xl mx-auto grid lg:grid-cols-[380px_1fr] gap-6">
        <div class="detail-cover">
          <img :src="card?.cover || card?.icon || '/assets/img/apk/avatar.webp'" :alt="card?.name" referrerpolicy="no-referrer" onerror="this.src='/assets/img/apk/avatar.webp'">
        </div>
        <div class="space-y-5">
          <div class="xy-glass p-7">
            <div class="flex items-start justify-between gap-4">
              <div>
                <h2 class="text-3xl font-bold text-white mb-2" x-text="card?.name || characterText('unnamed_role', '未命名角色')"></h2>
                <p class="text-violet-100/85 leading-relaxed" x-text="card?.summary || card?.description || characterText('summary_fallback', '点击开始对话。')"></p>
              </div>
              <span class="xy-badge xy-badge-purple" x-text="card?.source === 'user' ? characterText('user_badge', '用户角色') : characterText('official_badge', '官方角色')"></span>
            </div>
            <div class="flex flex-wrap gap-2 mt-5">
              <template x-for="t in (card?.tags || [])" :key="t">
                <span class="chip" x-text="t"></span>
              </template>
            </div>
          </div>

          <div class="xy-glass p-7" x-show="card?.description">
            <h3 class="font-semibold mb-3 text-violet-100 flex items-center gap-2"><span class="text-pink-300">✦</span> <span x-text="characterText('setting_title', '角色设定')"></span></h3>
            <p class="text-sm text-violet-100/85 leading-7 whitespace-pre-line" x-text="card?.description"></p>
          </div>

          <div class="xy-glass p-7" x-show="card?.opening_statement">
            <h3 class="font-semibold mb-3 text-violet-100 flex items-center gap-2"><span class="text-pink-300">✦</span> <span x-text="characterText('opening_title', '开场白')"></span></h3>
            <p class="text-sm text-violet-100/85 leading-7 whitespace-pre-line" x-text="card?.opening_statement"></p>
          </div>

          <div class="flex gap-3">
            <a :href="`/app/chat.html?app_id=${encodeURIComponent(card?.id || '')}`" class="xy-btn xy-btn-primary flex-1 justify-center" x-text="characterText('start_chat_text', '开始聊天')"></a>
            <a href="/app/create.html" class="xy-btn xy-btn-ghost" x-text="characterText('create_role_text', '创建角色')"></a>
          </div>
        </div>
      </section>

      <div x-show="!loading && !card" class="py-24 text-center text-violet-200/70">
        <p class="mb-4" x-text="characterText('not_found_text', '没有找到这个角色')"></p>
        <a href="/app/explore.html" class="xy-btn xy-btn-primary" x-text="characterText('back_to_explore_text', '回到探索')"></a>
      </div>
    </main>

    <nav class="app-bottom-nav" data-app-bottom-nav></nav>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色详情 · AI星月</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png">
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/app/assets/css/app.css?v=20260708-card-id">
  <script type="module" src="/app/assets/js/character.js?v=20260708-card-id"></script>
  <script defer src="/app/assets/vendor/alpine-3.14.1.min.js?v=3.14.1"></script>
</head>
<body class="min-h-screen">
  <div class="xy-stars-bg"></div>
  <div class="xy-meteor"></div>

  <div class="app-shell" x-data="characterPage()" x-init="init()" x-cloak>
    <aside class="app-sidebar" data-app-sidebar></aside>

    <main class="app-main">
      <header class="app-topbar">
        <a href="/app/" class="xy-btn xy-btn-ghost text-sm px-3 py-2" @click.prevent="goBack">← <span x-text="characterText('back_text', '返回')"></span></a>
        <h1 x-text="characterText('page_title', '角色详情')"></h1>
        <div class="grow"></div>
        <a :href="card ? `/app/chat.html?app_id=${encodeURIComponent(card.id)}` : '#'" class="xy-btn xy-btn-primary text-sm" x-text="characterText('start_chat_text', '开始聊天')"></a>
      </header>

      <div x-show="loading" class="flex items-center justify-center py-24">
        <div class="xy-loading"></div>
      </div>

      <section x-show="!loading && card" class="app-page-pad max-w-6xl mx-auto grid lg:grid-cols-[380px_1fr] gap-6">
        <div class="detail-cover">
          <img :src="card?.cover || card?.icon || '/assets/img/apk/avatar.webp'" :alt="card?.name" referrerpolicy="no-referrer" onerror="this.src='/assets/img/apk/avatar.webp'">
        </div>
        <div class="space-y-5">
          <div class="xy-glass p-7">
            <div class="flex items-start justify-between gap-4">
              <div>
                <h2 class="text-3xl font-bold text-white mb-2" x-text="card?.name || characterText('unnamed_role', '未命名角色')"></h2>
                <p class="text-violet-100/85 leading-relaxed" x-text="cardSummary()"></p>
                <div class="detail-id-row">
                  <code x-text="`ID: ${card?.id || ''}`"></code>
                  <button type="button" class="xy-btn xy-btn-ghost text-xs px-2 py-1" @click="copyCardId" x-text="characterText('copy_id_text', '复制 ID')">复制 ID</button>
                </div>
                <div class="flex flex-wrap gap-2 mt-4">
                  <button type="button" class="xy-btn xy-btn-ghost text-xs" :class="{ 'is-active': card?.liked }" @click="toggleLike($event)" x-text="likeLabel()">点赞</button>
                  <button type="button" class="xy-btn xy-btn-ghost text-xs" :class="{ 'is-active': card?.favorited }" @click="toggleFavorite($event)" x-text="favoriteLabel()">收藏</button>
                </div>
              </div>
              <span class="xy-badge xy-badge-purple" x-text="card?.source === 'user' ? characterText('user_badge', '用户角色') : characterText('official_badge', '角色设定')"></span>
            </div>
            <div class="flex flex-wrap gap-2 mt-5">
              <template x-for="t in (card?.tags || [])" :key="t">
                <span class="chip" x-text="t"></span>
              </template>
            </div>
            <div class="user-tags-box mt-5">
              <div class="user-tags-box__head">
                <span x-text="characterText('user_tags_title', '我的标签')">我的标签</span>
                <button type="button" class="xy-btn xy-btn-ghost text-xs" :disabled="userTagSaving" @click="saveUserTags" x-text="userTagSaving ? characterText('saving_text', '保存中') : characterText('save_text', '保存')">保存</button>
              </div>
              <input class="xy-input text-sm" x-model="userTagDraft" :placeholder="characterText('user_tags_placeholder', '例如：已测、喜欢、慢热；逗号分隔')">
              <div class="flex flex-wrap gap-2 mt-3" x-show="card?.user_tags?.length">
                <template x-for="t in (card?.user_tags || [])" :key="t">
                  <span class="chip chip-static" x-text="t"></span>
                </template>
              </div>
            </div>
          </div>

          <div class="xy-glass p-7">
            <h3 class="font-semibold mb-3 text-violet-100 flex items-center gap-2"><span class="text-pink-300">✦</span> <span x-text="characterText('comment_title', '评论区')"></span></h3>
            <form class="space-y-3" @submit.prevent="submitComment">
              <textarea class="xy-input" rows="3" maxlength="1000" x-model="commentDraft" :placeholder="characterText('comment_placeholder', '写下你的评论')" :disabled="commentSubmitting"></textarea>
              <div class="flex items-center justify-between gap-3">
                <span class="text-xs text-violet-100/45" x-text="`${commentDraft.length}/1000`"></span>
                <button type="submit" class="xy-btn xy-btn-primary text-sm" :disabled="commentSubmitting || !commentDraft.trim()" x-text="commentSubmitting ? characterText('comment_submitting_text', '发送中') : characterText('comment_submit_text', '回复')"></button>
              </div>
            </form>
            <div class="mt-5 space-y-3" x-show="comments.length">
              <template x-for="comment in comments" :key="comment.id">
                <article class="rounded-2xl border border-white/10 bg-white/[0.04] p-4">
                  <div class="flex items-start justify-between gap-3">
                    <div>
                      <div class="text-sm font-semibold text-violet-50" x-text="comment.user_name || characterText('comment_user_fallback', '星月用户')"></div>
                      <div class="text-xs text-violet-100/45 mt-1" x-text="formatTime(comment.created_at)"></div>
                    </div>
                    <button type="button" class="xy-btn xy-btn-ghost text-xs px-3 py-1" :class="{ 'is-active': comment.liked }" :disabled="commentLikingId === comment.id" @click="toggleCommentLike(comment)" x-text="commentLikeLabel(comment)"></button>
                  </div>
                  <p class="text-sm text-violet-100/80 leading-7 whitespace-pre-line mt-3" x-text="comment.content"></p>
                </article>
              </template>
            </div>
            <p class="text-sm text-violet-100/70 leading-7 mt-4" x-show="!commentsLoading && !comments.length" x-text="characterText('comment_empty_text', '暂无评论')"></p>
            <div class="mt-4 flex justify-center" x-show="commentsHasMore || commentsExpanded">
              <button type="button" class="xy-btn xy-btn-ghost text-sm" @click="toggleCommentsExpanded" x-text="commentsExpanded ? characterText('comment_collapse_text', '收起') : characterText('comment_expand_text', '展开全部')"></button>
            </div>
          </div>

          <div class="flex gap-3">
            <a :href="`/app/chat.html?app_id=${encodeURIComponent(card?.id || '')}`" class="xy-btn xy-btn-primary flex-1 justify-center" x-text="characterText('start_chat_text', '开始聊天')"></a>
            <a href="/app/create.html" class="xy-btn xy-btn-ghost" x-text="characterText('create_role_text', '创建角色')"></a>
          </div>
        </div>
      </section>

      <div x-show="!loading && !card" class="py-24 text-center text-violet-200/70">
        <p class="mb-4" x-text="characterText('not_found_text', '没有找到这个角色')"></p>
        <a href="/app/explore.html" class="xy-btn xy-btn-primary" x-text="characterText('back_to_explore_text', '回到探索')"></a>
      </div>
    </main>

    <nav class="app-bottom-nav" data-app-bottom-nav></nav>
  </div>
</body>
</html>

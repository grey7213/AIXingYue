<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页 · AI星月</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="preload" as="fetch" crossorigin="anonymous" href="/go/api/explore/search?page=1&amp;page_size=12&amp;sort=random&amp;rank=daily">
  <link rel="preload" as="script" href="/app/assets/vendor/alpine-3.14.1.min.js?v=3.14.1">
  <link rel="modulepreload" href="/assets/js/api.js">
  <link rel="modulepreload" href="/app/assets/js/app-core.js">
  <link rel="modulepreload" href="/app/assets/js/layout.js?v=20260703-fengyue-ui2">
  <link rel="stylesheet" href="/app/assets/css/app.css?v=20260703-fengyue-ui2">
  <script type="module" src="/app/assets/js/explore.js?v=20260703-fengyue-ui2"></script>
  <script defer src="/app/assets/vendor/alpine-3.14.1.min.js?v=3.14.1"></script>
</head>
<body class="min-h-screen">
  <div class="xy-stars-bg"></div>
  <div class="xy-meteor"></div>

  <div class="app-shell" x-data="explorePage()" x-init="init()" x-cloak>
    <aside class="app-sidebar" data-app-sidebar></aside>
    <main class="app-main">
      <header class="app-topbar">
        <h1 x-text="appHomeText('topbar_title', '首页')">首页</h1>
        <div class="grow"></div>
        <div class="relative">
          <input type="text" x-model="searchKeyword" @keydown.enter="loadList(true)" :placeholder="appHomeText('search_placeholder', '搜索角色')"
                 class="xy-input pl-9 py-1.5 text-sm w-48 sm:w-72">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-violet-300/70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M11 17a6 6 0 100-12 6 6 0 000 12z"/></svg>
        </div>
      </header>

      <div class="toolbar-line">
        <div class="segmented">
          <template x-for="rank in rankOptions" :key="rank.key">
            <button :class="{ 'is-active': activeRank === rank.key }" @click="setRank(rank.key)" x-text="rank.label"></button>
          </template>
        </div>
        <div class="segmented">
          <template x-for="sort in sortOptions" :key="sort.key">
            <button :class="{ 'is-active': activeSort === sort.key }" @click="setSort(sort.key)" x-text="sort.label"></button>
          </template>
        </div>
        <button class="toggle-pill" @click="togglePictureless"><span x-text="pictureless ? appHomeText('pictureless_on', '✦ 无图模式已开') : appHomeText('pictureless_off', '无图模式')"></span></button>
      </div>

      <div class="chip-row">
        <template x-for="cat in categories" :key="cat.key">
          <button class="chip" :class="{ 'is-active': activeCategory === cat.key }" @click="setCategory(cat.key)" x-text="cat.label"></button>
        </template>
      </div>

      <div x-show="loading && cards.length === 0" class="flex items-center justify-center py-24"><div class="xy-loading"></div></div>
      <div x-show="!loading && cards.length === 0" class="flex flex-col items-center justify-center py-24 text-violet-200/70">
        <img src="/assets/img/apk/empty_view.webp?v=20260627-logo" class="w-32 opacity-60 mb-4" alt="">
        <p class="text-sm" x-text="emptyText('explore_no_results', '没有找到匹配的角色')">没有找到匹配的角色</p>
      </div>

      <div class="char-grid">
        <template x-for="card in cards" :key="card.id">
          <a class="char-card" :class="{ 'is-pictureless': pictureless || card.pictureless }" :href="`/app/character.html?id=${encodeURIComponent(card.id)}`">
            <div class="char-card__cover">
              <img class="char-card__img" :src="card.cover || card.icon || '/assets/img/apk/avatar.webp'" :alt="card.name" loading="lazy" referrerpolicy="no-referrer" onerror="this.src='/assets/img/apk/avatar.webp'">
              <div class="char-card__overlay"></div>
              <div class="char-card__tags">
                <template x-for="t in (card.tags || []).slice(0, 2)" :key="t"><span class="char-card__tag" x-text="t"></span></template>
              </div>
            </div>
            <button class="char-card__fav" :class="{ 'is-active': card.favorited }" @click="toggleFavorite(card, $event)" :aria-label="appHomeText('favorite_label', '收藏')">♥</button>
            <div class="char-card__body">
              <div class="char-card__author" x-text="card.author || '官方角色'"></div>
              <div class="char-card__name" x-text="card.name"></div>
              <div class="char-card__desc" x-text="card.description || card.summary || '点击开始对话'"></div>
            </div>
          </a>
        </template>
      </div>

      <div x-show="cards.length > 0" class="text-center py-8">
        <button @click="loadMore" class="xy-btn xy-btn-ghost text-sm" :disabled="loading || !hasMore">
          <span x-show="!loading && hasMore" x-text="appHomeText('load_more_text', '加载更多')">加载更多</span>
          <span x-show="!hasMore" x-text="appHomeText('end_text', '已经到底啦 ✦')">已经到底啦 ✦</span>
          <span x-show="loading" class="xy-loading"></span>
        </button>
      </div>
    </main>
    <nav class="app-bottom-nav" data-app-bottom-nav></nav>
  </div>
</body>
</html>

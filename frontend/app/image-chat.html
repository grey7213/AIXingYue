<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片聊天 · AI星月</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png">
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/app/assets/css/app.css?v=20260703-fengyue-home3">
  <script type="module" src="/app/assets/js/hub-pages.js?v=20260703-channels-closed"></script>
  <script defer src="/app/assets/vendor/alpine-3.14.1.min.js?v=3.14.1"></script>
</head>
<body class="min-h-screen">
  <div class="xy-stars-bg"></div>

  <div class="app-shell" x-data="imageChatPage()" x-init="init()" x-cloak>
    <aside class="app-sidebar" data-app-sidebar></aside>
    <main class="app-main">
      <header class="app-topbar"><h1 x-text="appNavText('image', '图片聊天')">图片聊天</h1><div class="grow"></div><span class="xy-badge xy-badge-purple" x-text="emptyText('image_status_badge', '星月占位模式')">星月占位模式</span></header>
      <section class="app-page-pad max-w-5xl mx-auto grid lg:grid-cols-[.9fr_1.1fr] gap-5">
        <div class="form-panel space-y-4">
          <label class="drop-zone cursor-pointer">
            <input type="file" accept="image/*" class="hidden" @change="pickFile">
            <span x-text="previewName || emptyText('image_drop_text', '点击选择图片，或只输入提示词进行对话')"></span>
          </label>
          <textarea class="xy-input min-h-[140px] w-full" x-model="prompt" :placeholder="emptyText('image_prompt_placeholder', '描述你想让星月分析或生成的画面...')"></textarea>
          <button class="xy-btn xy-btn-primary w-full justify-center" @click="send" :disabled="sending || (!prompt.trim() && !filename)">
            <span x-show="!sending" x-text="emptyText('image_send_button', '发送图片对话')">发送图片对话</span><span x-show="sending" class="xy-loading"></span>
          </button>
        </div>
        <div class="list-panel">
          <template x-if="replies.length === 0"><div class="p-8 text-violet-200/70" x-text="emptyText('image_empty_text', '图片聊天请求会记录到操作记录里。接入图片模型后，这里会显示真实图像回复。')">图片聊天请求会记录到操作记录里。接入图片模型后，这里会显示真实图像回复。</div></template>
          <template x-for="r in replies" :key="r.created_at">
            <div class="list-row !grid-cols-[1fr]">
              <div><div class="title" x-text="emptyText('image_reply_title', '图片回复')">图片回复</div><div class="meta whitespace-pre-line" x-text="r.reply"></div></div>
            </div>
          </template>
        </div>
      </section>
    </main>
    <nav class="app-bottom-nav" data-app-bottom-nav></nav>
  </div>
</body>
</html>

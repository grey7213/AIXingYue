<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png">
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/app/assets/css/app.css?v=20260703-fengyue-ui2">
  <script type="module" src="/app/assets/js/me.js?v=20260703-fengyue-ui2"></script>
  <script defer src="/app/assets/vendor/alpine-3.14.1.min.js?v=3.14.1"></script>
</head>
<body class="min-h-screen">
  <div class="xy-stars-bg"></div>
  <div class="xy-meteor"></div>

  <div class="app-shell" x-data="mePage()" x-init="init()" x-cloak>

    <aside class="app-sidebar" data-app-sidebar></aside>

    <main class="app-main">
      <header class="app-topbar">
        <h1 x-text="accountText('topbar_title', '我的')">我的</h1>
        <div class="grow"></div>
        <button @click="doLogout" class="xy-btn xy-btn-ghost text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          <span x-text="dashboardText('logout_text', '退出登录')">退出登录</span>
        </button>
      </header>

      <template x-if="toast">
        <div class="xy-toast" :class="`xy-toast-${toast.type}`" x-text="toast.message"></div>
      </template>

      <div class="max-w-4xl mx-auto app-page-pad space-y-6">
        <!-- 个人卡 -->
        <div class="xy-glass p-7">
          <div class="flex flex-col lg:flex-row lg:items-center gap-6">
            <div class="flex items-center gap-4 min-w-0 lg:w-80">
              <div class="relative shrink-0">
                <div class="w-24 h-24 rounded-2xl overflow-hidden bg-gradient-to-br from-violet-500/40 to-fuchsia-500/40 border border-white/10 shadow-lg shadow-violet-500/20">
                  <img :src="profileAvatar()" @error="onAvatarError" class="w-full h-full object-cover" alt="">
                </div>
                <label class="absolute -right-2 -bottom-2 w-10 h-10 rounded-xl border border-white/15 bg-violet-500 hover:bg-violet-400 text-white flex items-center justify-center cursor-pointer shadow-lg shadow-violet-500/30" :class="uploadingAvatar ? 'opacity-70 pointer-events-none' : ''" :title="accountText('avatar_upload_title', '上传头像')">
                  <input type="file" accept="image/png,image/jpeg,image/webp,image/gif,image/avif" class="hidden" @change="onAvatarChange">
                  <span x-show="!uploadingAvatar">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8h4l2-3h6l2 3h4v11H3V8zm9 3a3 3 0 100 6 3 3 0 000-6z"/></svg>
                  </span>
                  <span x-show="uploadingAvatar" class="xy-loading"></span>
                </label>
              </div>
              <div class="min-w-0">
                <div class="text-2xl font-bold mb-1 truncate" x-text="user?.name || dashboardText('unnamed_user', '未命名用户')"></div>
                <div class="text-sm text-slate-400 truncate" x-text="user?.email"></div>
                <div class="text-xs text-slate-500 mt-2">
                  <span x-text="accountText('profile_registered_label', '注册')">注册</span>：<span x-text="formatDate(user?.created_at)"></span>
                </div>
                <div class="text-xs text-slate-500 mt-1">
                  <span x-text="accountText('display_id_label', '展示 ID')">展示 ID</span>：<code class="text-violet-300" x-text="profileDisplayId() || accountText('display_id_empty', '未设置')"></code>
                </div>
              </div>
            </div>

            <div class="grid md:grid-cols-[minmax(0,1fr)_minmax(0,1.35fr)_auto] gap-3 flex-1">
              <div>
                <label class="text-xs text-slate-400 mb-1 block" x-text="accountText('display_id_label', '展示 ID')">展示 ID</label>
                <input type="text" x-model="profileForm.display_id" maxlength="32" class="xy-input w-full font-mono" placeholder="xy_user_001">
              </div>
              <div>
                <label class="text-xs text-slate-400 mb-1 block" x-text="accountText('avatar_url_label', '头像 URL')">头像 URL</label>
                <input type="url" x-model="profileForm.avatar_url" class="xy-input w-full" placeholder="https://...">
              </div>
              <div class="flex md:flex-col gap-2 md:pt-5">
                <button @click="saveProfile" class="xy-btn xy-btn-primary text-sm justify-center" :disabled="savingProfile || uploadingAvatar">
                  <span x-show="!savingProfile" x-text="accountText('profile_save_button', '保存资料')">保存资料</span>
                  <span x-show="savingProfile" class="xy-loading"></span>
                </button>
                <button @click="clearAvatar" class="xy-btn xy-btn-ghost text-sm justify-center" x-text="accountText('avatar_reset_button', '恢复默认')">恢复默认</button>
              </div>
              <div class="md:col-span-3 flex flex-wrap items-center justify-between gap-3 text-xs text-slate-500">
                <div><span x-text="accountText('internal_id_label', '内部 ID')">内部 ID</span>：<code class="text-violet-300" x-text="user?.id || '-'"></code></div>
                <a href="/dashboard.html" class="xy-btn xy-btn-ghost text-sm" x-text="accountText('full_account_button', '完整账户')">完整账户</a>
              </div>
            </div>
          </div>
        </div>

        <!-- 积分卡 -->
        <div class="grid md:grid-cols-2 gap-6">
          <div class="xy-glass p-7 relative overflow-hidden">
            <div class="absolute -top-12 -right-12 w-40 h-40 rounded-full bg-violet-500/20 blur-3xl"></div>
            <div class="relative">
              <div class="text-sm text-slate-400 mb-2 flex items-center gap-2">
                <img src="/assets/img/apk/point.png" class="w-4 h-4 inline">
                <span x-text="dashboardText('balance_title', '当前积分余额')">当前积分余额</span>
              </div>
              <div class="text-5xl font-bold xy-gradient-text mb-3" x-text="points"></div>
              <div class="flex items-center gap-3">
                <button @click="doDailyCheckin" class="xy-btn xy-btn-primary text-sm" :disabled="loading">
                  <span x-show="!loading" x-text="dailyCheckinText()">每日签到 +10</span>
                  <span x-show="loading" class="xy-loading"></span>
                </button>
                <button @click="refreshPoints" class="xy-btn xy-btn-ghost text-sm" x-text="dashboardText('balance_refresh_text', '刷新')">刷新</button>
              </div>
              <div class="grid grid-cols-3 gap-2 mt-5">
                <div class="rounded-xl border border-white/10 bg-white/5 p-3">
                  <div class="text-xs text-slate-500" x-text="dashboardText('balance_free_label', '免费')">免费</div>
                  <div class="text-sm font-semibold text-cyan-100" x-text="balance.free_points.toLocaleString('zh-CN')"></div>
                </div>
                <div class="rounded-xl border border-white/10 bg-white/5 p-3">
                  <div class="text-xs text-slate-500" x-text="dashboardText('balance_paid_label', '充值')">充值</div>
                  <div class="text-sm font-semibold text-fuchsia-100" x-text="balance.paid_points.toLocaleString('zh-CN')"></div>
                </div>
                <div class="rounded-xl border border-white/10 bg-white/5 p-3">
                  <div class="text-xs text-slate-500" x-text="dashboardText('balance_reward_label', '奖励')">奖励</div>
                  <div class="text-sm font-semibold text-amber-100" x-text="balance.reward_points.toLocaleString('zh-CN')"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="xy-glass p-7">
            <div class="text-sm text-slate-400 mb-3 flex items-center gap-2">
              <img src="/assets/img/apk/coin3.png" class="w-4 h-4">
              <span x-text="dashboardText('purchase_section_label', '购买与兑换')">购买与兑换</span>
            </div>
            <div class="text-xl font-bold text-white mb-2" x-text="depositText('title', '爱发电购买兑换码')">爱发电购买兑换码</div>
            <p class="text-sm text-slate-400 mb-4" x-text="depositText('description', '付款后把站长发放的兑换码粘贴到这里，星月币会直接到账。')">付款后把站长发放的兑换码粘贴到这里，星月币会直接到账。</p>
            <button @click="openAifadian" class="xy-btn xy-btn-ghost w-full justify-center mb-3">
              <span x-text="depositText('button_text', '去爱发电购买')">去爱发电购买</span>
            </button>
            <div class="flex gap-2">
              <input type="text" x-model="redeemCode" @keydown.enter="redeemNow" class="xy-input flex-1 uppercase font-mono" :placeholder="depositText('redeem_placeholder', 'XY-XXXX-XXXX-XXXX-XXXX')">
              <button @click="redeemNow" class="xy-btn xy-btn-primary text-sm" :disabled="loading">
                <span x-show="!loading" x-text="depositText('redeem_button_text', '兑换')">兑换</span>
                <span x-show="loading" class="xy-loading"></span>
              </button>
            </div>
            <p class="text-xs text-slate-500 mt-3" x-text="paymentNote()"></p>
          </div>
        </div>

        <!-- 我的人设 Persona -->
        <div class="xy-glass p-7">
          <div class="text-sm text-slate-400 mb-3 flex items-center gap-2">
            <svg class="w-4 h-4 text-fuchsia-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            <span x-text="accountText('persona_section_label', '我的人设')">我的人设</span>
          </div>
          <div class="text-xl font-bold text-white mb-2" x-text="accountText('persona_title', '扮演你自己')">扮演你自己</div>
          <p class="text-sm text-slate-400 mb-4" x-text="accountText('persona_description', '设置你在角色扮演里的身份。聊天时 {{user}} 会替换成这个名字，角色也会知道关于你的设定。')">设置你在角色扮演里的身份。聊天时 {{user}} 会替换成这个名字，角色也会知道关于你的设定。</p>
          <div class="space-y-3">
            <div>
              <label class="text-xs text-slate-400 mb-1 block" x-text="accountText('persona_name_label', '人设名称')">人设名称</label>
              <input type="text" x-model="persona.name" maxlength="60" class="xy-input w-full" :placeholder="accountText('persona_name_placeholder', '例如：旅人、主人、小明…（留空则称呼你为「你」）')">
            </div>
            <div>
              <label class="text-xs text-slate-400 mb-1 block" x-text="accountText('persona_description_label', '人设描述')">人设描述</label>
              <textarea x-model="persona.description" maxlength="4000" class="xy-input w-full" style="min-height:90px" :placeholder="accountText('persona_description_placeholder', '一个喜欢冒险的旅行者，话不多但很可靠……（可选，会注入到对话上下文）')"></textarea>
            </div>
            <button @click="savePersona" class="xy-btn xy-btn-primary text-sm" :disabled="savingPersona">
              <span x-show="!savingPersona" x-text="accountText('persona_save_button', '保存人设')">保存人设</span>
              <span x-show="savingPersona" class="xy-loading"></span>
            </button>
          </div>
        </div>

        <!-- API 信息 -->
        <div class="xy-glass p-6">
          <h3 class="font-semibold mb-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-violet-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
            <span x-text="accountText('app_info_title', 'APP 接入信息')">APP 接入信息</span>
          </h3>
          <div class="grid md:grid-cols-2 gap-4 text-sm">
            <div>
              <div class="text-xs text-slate-400 mb-1" x-text="dashboardText('app_endpoint_label', '服务地址')">服务地址</div>
              <code class="block px-3 py-2 rounded bg-black/40 font-mono text-xs text-violet-200 break-all">https://patcher.villainy.top/</code>
            </div>
            <div>
              <div class="text-xs text-slate-400 mb-1" x-text="dashboardText('user_id_label', '用户 ID')">用户 ID</div>
              <code class="block px-3 py-2 rounded bg-black/40 font-mono text-xs text-violet-200 break-all" x-text="user?.id || '-'"></code>
            </div>
          </div>
          <p class="text-xs text-slate-500 mt-4" x-text="accountText('app_info_note', '用 APP 注册的账号在网页可以直接登录，反之亦然，积分共享。')">用 APP 注册的账号在网页可以直接登录，反之亦然，积分共享。</p>
        </div>
      </div>
    </main>
    <nav class="app-bottom-nav" data-app-bottom-nav></nav>
  </div>
</body>
</html>

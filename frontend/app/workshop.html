<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创作工坊 · AI星月</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png">
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/app/assets/css/app.css?v=20260712-hub-rose">
  <script type="module" src="/app/assets/js/hub-pages.js?v=20260711-cloak-theme"></script>
  <script defer src="/app/assets/vendor/alpine-3.14.1.min.js?v=3.14.1"></script>
</head>
<body class="min-h-screen hub-page hub-page--workshop">
  <div class="xy-stars-bg"></div>
  <div class="xy-meteor"></div>

  <div class="app-shell" x-data="workshopPage()" x-cloak>
    <aside class="app-sidebar" data-app-sidebar></aside>
    <main class="app-main">
      <header class="app-topbar">
        <h1 x-text="appNavText('workshop', '创作工坊')">创作工坊</h1>
        <div class="grow"></div>
        <a href="/app/create.html" class="xy-btn xy-btn-primary text-sm" x-text="myText('new_role_text', '＋ 新建角色')">＋ 新建角色</a>
      </header>
      <div class="hub-loading-skeleton app-page-pad max-w-6xl mx-auto" x-show="!ready" aria-label="正在加载创作工坊">
        <div class="hub-skeleton hub-skeleton--hero"></div>
        <div class="hub-skeleton-grid"><i></i><i></i><i></i><i></i></div>
        <div class="hub-skeleton-grid hub-skeleton-grid--wide"><i></i><i></i></div>
      </div>
      <section class="app-page-pad max-w-6xl mx-auto space-y-5" x-show="ready" x-transition.opacity>
        <div class="app-hero__panel">
          <div class="app-hero__eyebrow" x-text="emptyText('workshop_eyebrow', '创作者工具')">创作者工具</div>
          <h2 class="app-hero__title whitespace-pre-line" x-text="emptyText('workshop_title', '把你的角色卡\n送进 AI星月同库。')">把你的角色卡
送进 AI星月同库。</h2>
          <p class="app-hero__copy" x-text="emptyText('workshop_copy', '普通用户只需要填写设定、开场白和封面；模型 API 由站点后台统一配置，不必操心额度和 Key。')">普通用户只需要填写设定、开场白和封面；模型 API 由站点后台统一配置，不必操心额度和 Key。</p>
        </div>
        <div class="quick-grid !p-0">
          <a class="quick-tile" href="/app/create.html"><strong x-text="emptyText('workshop_create_title', '新建角色')">新建角色</strong><span x-text="emptyText('workshop_create_copy', '从零捏一张角色卡')">从零捏一张角色卡</span></a>
          <a class="quick-tile" href="/app/my-apps.html"><strong x-text="emptyText('workshop_my_roles_title', '我的角色')">我的角色</strong><span x-text="emptyText('workshop_my_roles_copy', '编辑公开状态与设定')">编辑公开状态与设定</span></a>
          <a class="quick-tile" href="/admin.html"><strong x-text="emptyText('workshop_official_title', '官方角色')">官方角色</strong><span x-text="emptyText('workshop_official_copy', '管理员发布与维护')">管理员发布与维护</span></a>
          <a class="quick-tile" href="/app/info.html"><strong x-text="emptyText('workshop_library_title', '角色库')">角色库</strong><span x-text="syncedLibraryText()"></span></a>
        </div>
        <div class="creator-ops-grid">
          <section class="creator-contest-panel">
            <div class="creator-panel__eyebrow" x-text="creatorContest?.period || ''"></div>
            <h2 x-text="creatorContest?.title || emptyText('creator_contest_title', '本期创作者比赛')">本期创作者比赛</h2>
            <p x-text="creatorContest?.description || emptyText('creator_contest_copy', '每两周统计公开角色的聊天量、收藏和点赞，优质创作者会进入展示榜。')"></p>
            <div class="creator-contest-panel__meta">
              <span x-text="creatorContest?.status || emptyText('creator_contest_status', '长期开放')"></span>
              <span x-show="contestMetricText()" x-text="contestMetricText()"></span>
            </div>
            <div class="creator-contest-panel__reward" x-text="creatorContest?.reward || emptyText('creator_contest_reward', '奖励：榜单展示、站内推荐位和后续积分激励。')"></div>
          </section>
          <section class="creator-leaderboard-panel">
            <div class="creator-panel__head">
              <h2 x-text="emptyText('creator_leaderboard_title', '创作者排行榜')">创作者排行榜</h2>
              <a href="/app/create.html" class="xy-link text-sm" x-text="myText('new_role_text', '＋ 新建角色')">＋ 新建角色</a>
            </div>
            <template x-if="creatorLeaderboard.length === 0">
              <div class="creator-leaderboard-empty" x-text="emptyText('creator_leaderboard_empty', '还没有公开用户角色，先发布一张角色卡吧。')">还没有公开用户角色，先发布一张角色卡吧。</div>
            </template>
            <template x-for="row in creatorLeaderboard" :key="row.user_id || row.rank">
              <div class="creator-leaderboard-row">
                <div class="creator-rank" x-text="row.rank"></div>
                <div class="creator-main">
                  <div class="creator-name" x-text="creatorName(row)"></div>
                  <div class="creator-meta" x-text="`${row.role_count || 0} 张角色 · ${row.like_count || 0} 赞 · ${row.favorite_count || 0} 收藏 · ${row.conversation_count || 0} 会话`"></div>
                </div>
                <div class="creator-score" x-text="creatorScore(row)"></div>
              </div>
            </template>
          </section>
        </div>
        <div class="list-panel workshop-role-list">
          <template x-if="myApps.length === 0"><div class="hub-empty-state" x-text="emptyText('workshop_empty_title', '你还没有创建过角色，点击右上角去新建吧')">你还没有创建过角色，点击右上角去新建吧</div></template>
          <template x-for="app in myApps" :key="app.id">
            <a class="list-row text-inherit no-underline" :href="`/app/my-apps.html`">
              <img :src="app.cover || '/assets/img/apk/avatar.webp'" alt="">
              <div><div class="title truncate" x-text="app.name"></div><div class="meta truncate" x-text="app.summary || app.description || myText('summary_fallback', '自建角色')"></div></div>
              <div class="row-actions"><span class="xy-btn xy-btn-ghost text-xs" x-text="myText('edit_text', '管理')">管理</span></div>
            </a>
          </template>
        </div>
      </section>
    </main>
    <nav class="app-bottom-nav" data-app-bottom-nav></nav>
  </div>
</body>
</html>
